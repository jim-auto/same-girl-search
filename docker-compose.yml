services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      SGS_DATA_DIR: /workspace/data
      SGS_SQLITE_PATH: /workspace/data/index/same_girl.sqlite3
      SGS_FAISS_PATH: /workspace/data/index/faces.faiss
      SGS_MODEL_NAME: buffalo_l
      SGS_DET_SIZE: "640"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - ./data:/workspace/data
      - ./libs:/workspace/libs
      - ./apps/api:/workspace/apps/api

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_INTERNAL_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
